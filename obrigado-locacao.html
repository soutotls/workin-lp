<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recebemos seu contato — Workin ERP</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #22253A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    header { margin-bottom: 48px; }
    header img { height: 120px; margin: 0 auto; }
    .check {
      width: 80px; height: 80px;
      background: #00AD50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .check svg { width: 40px; height: 40px; }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.25;
    }
    p {
      font-size: 1.05rem;
      color: #c8ccd8;
      max-width: 480px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      background: #00AD50;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 15px 32px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #008a3f; }
    .btn-wpp {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #25D366;
      margin-top: 12px;
    }
    .btn-wpp:hover { background: #1ebe5d; }
    .btn-wpp.desabilitado {
      background: #3a3e52;
      color: #7a7f95;
      cursor: not-allowed;
      pointer-events: none;
    }
    .btn-wpp.desabilitado:hover { background: #3a3e52; }
    .horario-msg {
      font-size: 0.82rem;
      color: #7a7f95;
      margin-top: 6px;
      text-align: center;
      line-height: 1.5;
    }
    .acoes {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    footer {
      margin-top: 56px;
      font-size: 0.78rem;
      color: #555a72;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo-workin-negativa.jpg" alt="Workin ERP" />
  </header>

  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1>Recebemos seu contato!</h1>

  <p>Nossa equipe vai entrar em contato em até <strong>24 horas</strong> para mostrar como o Workin funciona na sua locadora.</p>

  <div class="acoes">
    <a href="https://lp.sistemaworkin.com.br/lp-locacao-equipamentos.html" class="btn">← Voltar para a página</a>
    <a id="btn-wpp" href="https://wa.me/5567992811252?text=Ol%C3%A1%2C%20acabei%20de%20preencher%20o%20formul%C3%A1rio%20no%20site%20e%20gostaria%20de%20saber%20mais%20sobre%20o%20Workin." class="btn btn-wpp" target="_blank" rel="noopener">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.117.549 4.103 1.508 5.836L.057 23.75a.5.5 0 0 0 .614.635l6.094-1.597A11.96 11.96 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.013-1.375l-.36-.214-3.724.977.993-3.634-.235-.374A9.818 9.818 0 1 1 12 21.818z"/></svg>
      <span id="btn-wpp-texto">Falar pelo WhatsApp agora</span>
    </a>
    <p id="horario-msg" class="horario-msg"></p>
  </div>

  <footer>
    Workin — 3LMS Manutenção e Sistemas Ltda · CNPJ: 24.375.944/0001-01
  </footer>

  <script>
    (function () {
      var now = new Date();
      var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
      var ms = new Date(utc + (-4 * 3600000)); // GMT-4 (MS)
      var day = ms.getDay();   // 0=Dom, 1=Seg ... 5=Sex, 6=Sáb
      var hour = ms.getHours();
      var isWeekday = day >= 1 && day <= 5;
      var isWorkingHour = hour >= 7 && hour < 18;
      if (!isWeekday || !isWorkingHour) {
        var btn = document.getElementById('btn-wpp');
        var msg = document.getElementById('horario-msg');
        btn.classList.add('desabilitado');
        btn.removeAttribute('href');
        btn.removeAttribute('target');
        msg.textContent = 'Atendimento disponível seg–sex, das 7h às 18h (horário de MS).';
      }
    })();
  </script>

</body>
</html>
